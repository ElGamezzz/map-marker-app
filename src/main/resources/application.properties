#  Base de datos H2 en memoria: cero configuración, ideal para demos/entrevistas.
# Se crea automáticamente al iniciar la app y se destruye al detenerla.
spring.datasource.url=jdbc:h2:mem:marcadoresdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#  JPA/Hibernate: 
# - ddl-auto=update crea/actualiza tablas según las @Entity.
# - show-sql=true permite auditar las consultas SQL generadas (útil para debugging).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#  Consola H2 habilitada para inspección manual: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
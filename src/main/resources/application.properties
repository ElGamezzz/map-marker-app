# H2 en memoria (sobrevive al refrescar la página, se reinicia al detener la app)
spring.datasource.url=jdbc:h2:mem:marcadoresdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

# Consola H2 para verificar datos manualmente
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logs claros de Hibernate (opcional, útil para práctica)
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG